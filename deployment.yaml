apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-results
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-results
  template:
    metadata:
      labels:
        app: student-results
    spec:
      containers:
      - name: student-results
        image: your-dockerhub-username/student-results:latest
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: student-service
spec:
  type: NodePort
  selector:
    app: student-results
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007